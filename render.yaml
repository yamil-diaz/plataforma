databases:
  - name: plataforma-db
    databaseName: plataforma
    user: plataforma_user
    plan: free

services:
  - type: web
    name: plataforma
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: plataforma-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://plataforma.onrender.com"
